<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#050608">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="ChispaChat">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>ChispaChat</title>
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="apple-touch-icon" href="./icons/icon-180.png">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Mensajes</p>
          <h1>ChispaChat</h1>
        </div>
        <button id="openGalleryButton" class="icon-button" type="button" aria-label="Abrir galería local" title="Galería local">
          <span aria-hidden="true">▦</span>
        </button>
      </header>

      <main>
        <section id="privacyNotice" class="privacy-notice" aria-label="Aviso de privacidad">
          <p>Esta PWA guarda las fotos y vídeos únicamente en este dispositivo. No se sube nada a internet.</p>
          <button id="dismissNoticeButton" type="button">Entendido</button>
        </section>

        <section class="status-panel" aria-live="polite">
          <video id="cameraPreview" class="camera-preview" playsinline muted autoplay hidden></video>
          <canvas id="photoCanvas" hidden></canvas>
          <p id="statusMessage">Toca una conversación para usar la cámara local.</p>
        </section>

        <section id="zoomStories" class="zoom-stories" aria-label="Controles de zoom de cámara" hidden>
          <button class="story-zoom active" type="button" data-zoom="0.5">
            <span>0,5x</span>
          </button>
          <button class="story-zoom" type="button" data-zoom="1">
            <span>1x</span>
          </button>
          <button class="story-zoom" type="button" data-zoom="2">
            <span>2x</span>
          </button>
          <button class="story-zoom" type="button" data-zoom="5">
            <span>5x</span>
          </button>
        </section>

        <section class="chat-list" aria-label="Lista de conversaciones">
          <button class="chat-row action-row" id="photoChat" type="button">
            <span class="avatar avatar-photo" aria-hidden="true">A</span>
            <span class="chat-copy">
              <span class="chat-title">Alicia compipiso</span>
              <span class="chat-last" id="photoLastMessage">te mando una foto ahora</span>
            </span>
            <span class="chat-meta" id="photoMeta">ahora</span>
          </button>

          <button class="chat-row action-row" id="videoChat" type="button">
            <span class="avatar avatar-video" aria-hidden="true">M</span>
            <span class="chat-copy">
              <span class="chat-title">Mamá móvil</span>
              <span class="chat-last" id="videoLastMessage">nota de vídeo pendiente</span>
            </span>
            <span class="chat-meta" id="videoMeta">local</span>
          </button>

          <button class="chat-row" type="button" aria-label="Conversación decorativa sin acciones">
            <span class="avatar avatar-muted" aria-hidden="true">N</span>
            <span class="chat-copy">
              <span class="chat-title">Grupo del portal</span>
              <span class="chat-last">Luego os cuento bien</span>
            </span>
            <span class="chat-meta">12:10</span>
          </button>

          <button class="chat-row" type="button" aria-label="Conversación decorativa sin acciones">
            <span class="avatar avatar-muted alt" aria-hidden="true">R</span>
            <span class="chat-copy">
              <span class="chat-title">Plan improvisado</span>
              <span class="chat-last">¿Quedamos en diez?</span>
            </span>
            <span class="chat-meta">ayer</span>
          </button>
        </section>
      </main>
    </div>

    <dialog id="galleryDialog" class="gallery-dialog">
      <form method="dialog" class="dialog-header">
        <div>
          <p class="eyebrow">Solo en este dispositivo</p>
          <h2>Galería local</h2>
        </div>
        <button class="icon-button" value="close" aria-label="Cerrar galería" title="Cerrar" type="submit">
          <span aria-hidden="true">×</span>
        </button>
      </form>

      <div class="gallery-actions">
        <button id="refreshGalleryButton" type="button">Actualizar</button>
        <button id="clearGalleryButton" class="danger" type="button">Borrar todo</button>
      </div>

      <div id="galleryEmpty" class="empty-state">Todavía no hay fotos ni vídeos guardados.</div>
      <div id="galleryList" class="gallery-list" aria-live="polite"></div>
    </dialog>

    <script src="./app.js" defer></script>
  </body>
</html>
